services:
  - type: web
    name: breathe-esg-api
    runtime: python-3.11
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: breathe-esg-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://breathe-esg-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString

  - type: static
    name: breathe-esg-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publicPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://breathe-esg-api.onrender.com/api

databases:
  - name: breathe-esg-db
    plan: free
    dbName: breathe_esg
    user: breathe_esg
